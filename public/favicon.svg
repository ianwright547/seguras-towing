<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="32" fill="#1C1917"/>
  <!-- Tow truck silhouette in brand orange -->
  <g fill="#E8720C">
    <!-- Truck cab -->
    <path d="M12 38V26c0-1.1.9-2 2-2h8l4-5h6c1.1 0 2 .9 2 2v17H12z"/>
    <!-- Truck bed / flatbed -->
    <rect x="34" y="28" width="20" height="10" rx="1"/>
    <!-- Hook/boom arm -->
    <path d="M44 20l6 8h-4l-4-6V20z" fill="#D06409"/>
    <circle cx="48" cy="18" r="2.5" fill="#E8720C"/>
    <!-- Wheels -->
    <circle cx="20" cy="40" r="5" fill="#1C1917" stroke="#E8720C" stroke-width="2.5"/>
    <circle cx="20" cy="40" r="2" fill="#E8720C"/>
    <circle cx="44" cy="40" r="5" fill="#1C1917" stroke="#E8720C" stroke-width="2.5"/>
    <circle cx="44" cy="40" r="2" fill="#E8720C"/>
  </g>
  <!-- "S" letter mark -->
  <text x="15" y="54" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="10" fill="#fff" opacity="0.9">S</text>
</svg>
